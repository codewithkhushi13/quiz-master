<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bubbles">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div id="loginBox">
    <h2>Login to Start Quiz</h2>
    <input type="text" id="username" placeholder="Enter your name" />
    <button type="button" id="loginBtn">Start</button>
  </div>

  <div id="categoryBox" style="display:none;">
    <h2>Select Category</h2>
    <button class="category-btn" onclick="startQuiz('gk')">GK Quiz</button>
    <button class="category-btn" onclick="startQuiz('tech')">Tech Quiz</button>
  </div>

  <div class="quiz-container" id="quizBox" style="display:none;">
    <h1 id="welcomeUser" style="color:white;">Quiz Application</h1>

    <div class="progress-container">
      <div id="progressBar"></div>
    </div>
  <p id="progressText"></p>
  <p id="timer">Timer: 10</p>
  <h2 id="question">Question</h2>
  <div id="options"></div>
    <button type="button" class="next-btn" id="nextBtn" onclick="nextQuestion()" disabled>
      Next <span class="arrow">→</span>
    </button>
    <h3 id="score"></h3>
    <button class="restart-btn" onclick="restartQuiz()">Restart Quiz</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
